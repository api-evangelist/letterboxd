apis:
  - name: Letterboxd API
    description: >-
      REST API providing access to Letterboxd film data, member profiles,
      watchlists, ratings, diary log entries, user-created lists, contributors,
      editorial stories, and cross-catalog search. The base URL is
      https://api.letterboxd.com/api/v0. Access is granted by application
      only; developers must email api@letterboxd.com with their use case.
      Authentication uses OAuth2 Client Credentials for public data and
      Authorization Code for member-specific operations.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
