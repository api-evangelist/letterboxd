aid: letterboxd
name: Letterboxd
description: >-
  Letterboxd is a social film diary platform providing a REST API for accessing
  film metadata, user reviews, watchlists, ratings, member activity, log entries,
  lists, and film festival coverage. The API is available by request only and
  uses OAuth2 for authentication, supporting both public data access via Client
  Credentials and member-authenticated operations via Authorization Code flow.
  Developers can query films, members, log entries, lists, contributors, and
  search across the full Letterboxd catalog.
